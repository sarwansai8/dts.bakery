  <!-- Scripts (order matters) -->
  <script src="js/lib/router.js"></script>
  <script src="js/store/store.js"></script>
  <script src="js/api/data.js"></script>
  <script src="js/components/ui.js"></script>
  <script src="js/components/layout.js"></script>
  <script src="js/pages/pages.js"></script>

  <!-- App Initialization -->
  <script>
    // Initialize the application
    (function initApp() {
      // Setup router
      Router.init('app');

      // Define routes
      Router.route('/', Pages.home);
      Router.route('/products', Pages.products);
      Router.route('/products/:slug', Pages.productDetail);
      Router.route('/cart', Pages.cart);
      Router.route('/checkout', Pages.checkout);
      Router.route('/login', Pages.login);
      Router.route('/register', Pages.register);
      Router.route('/account', Pages.account);
      Router.route('/about', Pages.about);
      Router.route('/contact', Pages.contact);
      Router.route('/faq', Pages.faq);
      Router.route('/shipping', Pages.shipping);
      Router.route('/returns', Pages.returns);
      Router.route('/privacy', Pages.privacy);
      Router.route('/terms', Pages.terms);
      Router.route('/sitemap', Pages.sitemap);
      Router.route('/orders', Pages.orders);

      // 404 handler
      Router.notFound(Pages.notFound);

      // After each route change, update cart badge and active nav
      Router.afterEach(() => {
        Layout.updateCartBadge();
        Layout.setActiveNavLink();
      });

      // Subscribe cart store to update badge on changes
      CartStore.subscribe(() => {
        Layout.updateCartBadge();
        Layout.updateCartDrawer();
      });

      console.log(
        '%c🍫 DTS Chocolate — Sweet Moments, Made With Love',
        'font-size:16px;font-weight:bold;color:#92400E;background:#FEF3C7;padding:8px 16px;border-radius:8px'
      );
    })();
  </script>
